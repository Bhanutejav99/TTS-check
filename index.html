
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MockMaster | Aura Studio Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-canvas: #04192c;
      --accent-primary: #4F46E5;
      --accent-success: #10B981;
      --accent-error: #F43F5E;
      --text-main: #FFFFFF;
      --studio-white: #0B2545;
    }
    
    body { 
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-canvas);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    .studio-shadow {
      box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.5), 0 20px 40px -20px rgba(0, 0, 0, 0.3);
    }

    .glass-ui {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .option-chip-pro {
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border-width: 3px;
      border-style: solid;
    }

    .option-chip-pro:hover:not(:disabled) {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.25);
    }

    .rec-pulse { animation: pulse-ring 2s infinite; }
    @keyframes pulse-ring {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
    }

    @keyframes shrink {
      from { width: 100%; }
      to { width: 0%; }
    }

    @keyframes grow {
      from { width: 0%; }
      to { width: 100%; }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .aspect-16-9 { aspect-ratio: 16 / 9; }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body class="selection:bg-indigo-500 selection:text-white">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
